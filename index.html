<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; worker-src 'self';">
<title>PAC-MAN</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<meta name="theme-color" content="#000820">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PAC-MAN">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
</head>
<body tabindex="0">

<div id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">SCORE</span>
    <span class="hud-val gold" id="hud-score">0</span>
  </div>
  <div class="hud-block" style="align-items:center;">
    <span style="font-size:13px;color:#FFE000;text-shadow:0 0 12px #FFE000,0 0 30px #FF8800;">★ PAC-MAN ★</span>
  </div>
  <div class="hud-block" style="align-items:flex-end;">
    <span class="hud-label">BEST</span>
    <span class="hud-val cyan" id="hud-hi">0</span>
  </div>
</div>

<div id="lives-row"></div>

<div id="game-wrap">
  <canvas id="canvas" tabindex="0" aria-label="Zone de jeu Pac-Man"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
</div>

<div id="dpad">
  <button class="dbtn" id="dbtn-up" aria-label="Haut">▲</button>
  <button class="dbtn" id="dbtn-left" aria-label="Gauche">◀</button>
  <div id="dbtn-center" aria-hidden="true"><span>LVL</span><span id="hud-level" style="color:rgba(255,255,255,0.5);">1</span></div>
  <button class="dbtn" id="dbtn-right" aria-label="Droite">▶</button>
  <button class="dbtn" id="dbtn-down" aria-label="Bas">▼</button>
</div>

<script type="module" src="js/main.mjs"></script>
</body>
</html>
